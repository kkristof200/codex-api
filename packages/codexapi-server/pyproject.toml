[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "codexapi-server"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "codexapi-client",
    "requests==2.32.5",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "pydantic>=2.0",
    "openai>=2.26.0",
    "certifi",
]

[project.scripts]
codexapi = "codexapi_server.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.uv.sources]
codexapi-client = { workspace = true }
